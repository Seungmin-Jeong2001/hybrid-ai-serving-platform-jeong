stages:
  - build-base
  - security-scan
  - model-package
  - deploy
  - notify

variables:
  HARBOR_REGISTRY: "harbor.intp.me"
  HARBOR_PROJECT: "infra"
  IMAGE_NAME: "model-build-image"
  MODEL_PROJECT: "models"
  MODEL_IMAGE_NAME: "predictive-model"

  # Harbor 경유 기존 경로
  # TRIVY_IMAGE: "${HARBOR_REGISTRY}/docker-hub/aquasec/trivy:latest"
  # 임시 우회용 공식 이미지
  TRIVY_IMAGE: "aquasec/trivy:latest"
  BASTION_CACHE_DIR: "/opt/hybrid-ai/bastion-cache"

# ==============================================================================
# 🚨 공통 실패 알림 템플릿
# ==============================================================================
.failure_notification:
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        GITLAB_CA_CERT=""
        if [ -n "${HARBOR_CA_CERT:-}" ]; then
          if [ -f "$HARBOR_CA_CERT" ]; then
            GITLAB_CA_CERT="$HARBOR_CA_CERT"
          else
            GITLAB_CA_CERT="/tmp/intp-ca.crt"
            printf '%s\n' "$HARBOR_CA_CERT" > "$GITLAB_CA_CERT"
          fi
        fi

        fetch_job_trace() {
          if [ -n "$GITLAB_CA_CERT" ]; then
            curl --silent --show-error --cacert "$GITLAB_CA_CERT" --header "JOB-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/$CI_JOB_ID/trace"
          else
            curl --silent --show-error --header "JOB-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/$CI_JOB_ID/trace"
          fi
        }

        RAW_LOG=$(fetch_job_trace | tail -n 5 || true)

        if echo "$RAW_LOG" | grep -q "401 Unauthorized"; then
          SAFE_LOG="⚠️ GitLab 권한 정책으로 인해 로그를 추출할 수 없습니다. 위의 'GitLab 링크'를 클릭하여 에러를 직접 확인해주세요."
        else
          SAFE_LOG=$(echo "$RAW_LOG" | tr -d '"' | tr -d '`' | awk 1 ORS='\\n' | cut -c 1-300)
        fi

        if [ "$CI_PIPELINE_SOURCE" = "push" ]; then
          PLANE_TAG="PRIVATE"
        else
          PLANE_TAG="HYBRID"
        fi
        SEVERITY_TAG="FAILED"

        PAYLOAD=$(printf '{
          "text": "[%s][%s]\n❌ 파이프라인 잡 에러 발생: `%s`\n🔗 *로그 확인:* <%s|GitLab 링크>\n⚠️ *에러 로그 요약:*\n```\n%s\n```"
        }' "$SEVERITY_TAG" "$PLANE_TAG" "$CI_JOB_NAME" "$CI_JOB_URL" "$SAFE_LOG")

        curl --silent --show-error -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
      fi

build-heavy-base:
  extends: .failure_notification
  stage: build-base
  image: gcr.io/kaniko-project/executor:v1.23.2-debug
  tags:
    - gpu-worker
  script:
    - |
      : "${HARBOR_CA_CERT:?HARBOR_CA_CERT is required}"
      mkdir -p /kaniko/.docker /kaniko/certs
      if [ -f "$HARBOR_CA_CERT" ]; then
        cp "$HARBOR_CA_CERT" /kaniko/certs/ca.crt
      else
        printf '%s\n' "$HARBOR_CA_CERT" > /kaniko/certs/ca.crt
      fi
      AUTH=$(echo -n "${HARBOR_USER}:${HARBOR_PASSWORD}" | base64)
      echo "{\"auths\":{\"${HARBOR_REGISTRY}\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
      /kaniko/executor --context="${CI_PROJECT_DIR}" --dockerfile="${CI_PROJECT_DIR}/Dockerfile.build" --destination="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:latest" --registry-certificate="${HARBOR_REGISTRY}=/kaniko/certs/ca.crt"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: [Dockerfile.build, model_build.py, .gitlab-ci.yml]

trivy-scan:
  extends: .failure_notification
  stage: security-scan
  image: $TRIVY_IMAGE
  tags:
    - gpu-worker
  needs: [build-heavy-base]
  before_script:
    - apk add --no-cache ca-certificates curl
    - ': "${HARBOR_CA_CERT:?HARBOR_CA_CERT is required}"'
    - if [ -f "$HARBOR_CA_CERT" ]; then cp "$HARBOR_CA_CERT" /usr/local/share/ca-certificates/harbor.intp.me.crt; else printf '%s\n' "$HARBOR_CA_CERT" > /usr/local/share/ca-certificates/harbor.intp.me.crt; fi
    - update-ca-certificates
  script:
    - |
      TRIVY_EXIT=0
      TRIVY_USERNAME="$HARBOR_USER" TRIVY_PASSWORD="$HARBOR_PASSWORD" trivy image --scanners vuln --exit-code 1 --severity CRITICAL,HIGH "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:latest" > trivy_log.txt 2>&1 || TRIVY_EXIT=$?

      cat trivy_log.txt || true

      if [ $TRIVY_EXIT -ne 0 ]; then
        SAFE_LOG=$(tail -n 12 trivy_log.txt | tr -d '"' | tr -d '`' | awk 1 ORS='\\n' | cut -c 1-300)
        PAYLOAD=$(printf '{
          "text": "[WARNING][PRIVATE]\n⚠️ *베이스 이미지 보안 취약점 발견:*\n빌드는 계속 진행되지만, `model-build-image`에 패치가 필요한 취약점이 있습니다.\n🔗 *결과 확인:* <%s|GitLab 링크>\n🚨 *Trivy 스캔 요약:*\n```\n%s\n```"
        }' "$CI_JOB_URL" "$SAFE_LOG")
        curl --silent --show-error -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: [Dockerfile.build, model_build.py, .gitlab-ci.yml]

sync-harbor-to-ecr:
  extends: .failure_notification
  stage: model-package

  # Harbor 경유 기존 경로
  # image: harbor.intp.me/docker-hub/library/alpine:3.20
  # 임시 우회용 공식 이미지
  image: alpine:3.20

  tags:
    - gpu-worker
  before_script:
    - apk add --no-cache aws-cli ca-certificates skopeo
    - ': "${HARBOR_CA_CERT:?HARBOR_CA_CERT is required}"'
    - if [ -f "$HARBOR_CA_CERT" ]; then cp "$HARBOR_CA_CERT" /usr/local/share/ca-certificates/harbor.intp.me.crt; else printf '%s\n' "$HARBOR_CA_CERT" > /usr/local/share/ca-certificates/harbor.intp.me.crt; fi
    - update-ca-certificates
    - |
      TRIVY_ARCHIVE="$(find "${BASTION_CACHE_DIR}/tools/linux-amd64" -maxdepth 1 -name 'trivy_*_Linux-64bit.tar.gz' | sort | tail -n 1)"
      test -n "$TRIVY_ARCHIVE"
      tar -xzf "$TRIVY_ARCHIVE" -C /usr/local/bin trivy
      chmod +x /usr/local/bin/trivy
  script:
    - |
      TARGET_TAG="${IMAGE_TAG:?IMAGE_TAG is required}"
      SRC_IMG="${HARBOR_REGISTRY}/${MODEL_PROJECT}/${MODEL_IMAGE_NAME}:${TARGET_TAG}"
      DEST_IMG="${ECR_ENDPOINT}/${MODEL_IMAGE_NAME}:${TARGET_TAG}"

      TRIVY_EXIT=0
      TRIVY_USERNAME="$HARBOR_USER" TRIVY_PASSWORD="$HARBOR_PASSWORD" trivy image --scanners vuln --exit-code 1 --severity CRITICAL,HIGH --image-src remote "$SRC_IMG" > trivy_log.txt 2>&1 || TRIVY_EXIT=$?

      cat trivy_log.txt || true

      if [ $TRIVY_EXIT -ne 0 ]; then
        SAFE_LOG=$(tail -n 12 trivy_log.txt | tr -d '"' | tr -d '`' | awk 1 ORS='\\n' | cut -c 1-300)
        PAYLOAD=$(printf '{
          "text": "[WARNING][HYBRID]\n⚠️ *보안 취약점 발견:*\n배포는 정상 진행되나, `%s` 이미지에 조치가 필요한 CRITICAL/HIGH 취약점이 있습니다.\n🔗 *결과 확인:* <%s|GitLab 링크>\n🚨 *Trivy 스캔 요약:*\n```\n%s\n```"
        }' "$MODEL_IMAGE_NAME" "$CI_JOB_URL" "$SAFE_LOG")
        curl --silent --show-error -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
      fi

      ECR_PASSWORD="$(aws ecr get-login-password --region ap-northeast-2)"
      skopeo copy \
        --src-creds "${HARBOR_USER}:${HARBOR_PASSWORD}" \
        --dest-creds "AWS:${ECR_PASSWORD}" \
        "docker://${SRC_IMG}" \
        "docker://${DEST_IMG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"'

update-git-manifest:
  extends: .failure_notification
  stage: deploy

  # Harbor 경유 기존 경로
  # image: harbor.intp.me/docker-hub/library/alpine:3.18
  # 임시 우회용 공식 이미지
  image: alpine:3.18

  tags:
    - gpu-worker
  needs: [sync-harbor-to-ecr]
  script:
    - |
      apk add --no-cache git sed curl
      TARGET_TAG="${IMAGE_TAG:?IMAGE_TAG is required}"
      NEW_IMAGE="${ECR_ENDPOINT}/${MODEL_IMAGE_NAME}:${TARGET_TAG}"
      git clone "https://x-access-token:${GITHUB_PAT}@github.com/SGS-Strategy/hybrid-ai-serving-platform.git" repo
      sed -i "s|image:.*|image: ${NEW_IMAGE}|g" repo/public/k8s/serving/predictive-model/pdm-isvc.yaml
      cd repo
      git config --global user.email "bot@intp.me"
      git config --global user.name "MLOps Bot"
      git add .
      if ! git diff --cached --quiet; then
        git commit -m "update image to ${TARGET_TAG}"
        git push origin main
      else
        echo "No changes detected"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"'

notify-success:
  stage: notify

  # Harbor 경유 기존 경로
  # image: harbor.intp.me/docker-hub/curlimages/curl:latest
  # 임시 우회용 공식 이미지
  image: alpine:3.20

  tags:
    - gpu-worker
  script:
    - |
      apk add --no-cache curl

      if [ "$CI_PIPELINE_SOURCE" = "push" ]; then
        PLANE_TAG="PRIVATE"
        SEVERITY_TAG="SUCCESS"
        MSG_CONTENT="🐳 사설망 대용량 베이스 이미지 빌드 및 파이프라인 통과 완료"
      else
        TARGET_TAG="${IMAGE_TAG:?IMAGE_TAG is required}"
        PLANE_TAG="HYBRID"
        SEVERITY_TAG="SUCCESS"
        MSG_CONTENT="📦 ${MODEL_IMAGE_NAME} 퍼블릭 에코시스템 배포 안착 완료 (태그: ${TARGET_TAG})"
      fi

      PAYLOAD=$(printf '{
        "text": "[%s][%s]\n🟢 %s\n🚀 *파이프라인 결과:* <%s|배포 성공 확인>"
      }' "$SEVERITY_TAG" "$PLANE_TAG" "$MSG_CONTENT" "$CI_PIPELINE_URL")

      curl --silent --show-error -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"'
      needs: [update-git-manifest]
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: [Dockerfile.build, model_build.py, .gitlab-ci.yml]
      needs: [trivy-scan]
