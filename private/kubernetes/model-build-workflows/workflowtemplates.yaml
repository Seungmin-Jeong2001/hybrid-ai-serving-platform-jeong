apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: model-build-job
  namespace: model-build
  labels:
    app.kubernetes.io/name: model-build-job
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
spec:
  entrypoint: model-build
  serviceAccountName: model-build-workflow
  podGC:
    strategy: OnWorkflowCompletion
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterFailure: 604800
  arguments:
    parameters:
      - name: git_repo_url
        value: https://gitlab.intp.me/3stacks/predictor-model.git
      - name: git_ref
        value: main
      - name: training_image
        value: harbor.intp.me/infra/model-build-image:latest
      - name: train_command
        value: python /workspace/model_build.py
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: model-build-cache
  templates:
    - name: model-build
      steps:
        - - name: clone-code
            template: clone-code
        - - name: train
            template: train

    - name: clone-code
      container:
        image: python:3.9-slim
        command: [sh, -c]
        env:
          - name: GIT_USER
            valueFrom:
              secretKeyRef:
                name: gitlab-secret
                key: username
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: gitlab-secret
                key: token
        args:
          - |
            set -eu
            apt-get update -q && apt-get install -y git -q
            workdir="/workspace/{{workflow.name}}"
            rm -rf "${workdir}/src"
            mkdir -p "${workdir}"
            
            cat > /tmp/.netrc <<NETRC_EOF
            machine gitlab.intp.me
            login ${GIT_USER}
            password ${GIT_TOKEN}
            NETRC_EOF
            chmod 600 /tmp/.netrc
            
            export HOME=/tmp
            git -c http.sslVerify=false clone --depth 1 --branch "{{workflow.parameters.git_ref}}" "{{workflow.parameters.git_repo_url}}" "${workdir}/src"
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: train
      nodeSelector:
        hybrid-ai.io/node-role: gpu-worker
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      podSpecPatch: '{"runtimeClassName":"nvidia"}'
      container:
        image: "{{workflow.parameters.training_image}}"
        workingDir: /workspace/{{workflow.name}}/src
        command: [sh, -c]
        env:
          - name: MINIO_ENDPOINT
            value: "10.42.0.88:30900"
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-secret
                key: accessKey
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-secret
                key: secretKey
        args:
          - |
            set -eu
            {{workflow.parameters.train_command}}
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
            nvidia.com/gpu: "1"
        volumeMounts:
          - name: workspace
            mountPath: /workspace