apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: minio-sensor
  namespace: argo-events
  labels:
    app.kubernetes.io/name: minio-sensor
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
spec:
  serviceAccountName: argo-events-sa

  dependencies:
    - name: minio-success
      eventSourceName: minio-eventsource
      eventName: dataset-success
      filters:
        data:
          - path: body.Records.0.s3.object.key
            type: string
            value:
              - "^raw-data/.*/_SUCCESS$"

  triggers:
    - template:
        name: minio-trigger
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: model-build-job-
                namespace: model-build
                labels:
                  app.kubernetes.io/name: model-build-job
                  app.kubernetes.io/part-of: hybrid-ai-serving-platform
                  triggered-by: minio
              spec:
                workflowTemplateRef:
                  name: model-build-job
                arguments:
                  parameters:
                    - name: image_tag
                      value: raw-data%2Fdev%2F_SUCCESS
          parameters:
            - src:
                dependencyName: minio-success
                dataKey: body.Records.0.s3.object.key
              dest: spec.arguments.parameters.0.value