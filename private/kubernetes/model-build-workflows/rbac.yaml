apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-build-workflow
  namespace: model-build
  labels:
    app.kubernetes.io/name: model-build-workflow
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-build-workflow
  namespace: model-build
  labels:
    app.kubernetes.io/name: model-build-workflow
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "pods/log", "persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-build-workflow
  namespace: model-build
  labels:
    app.kubernetes.io/name: model-build-workflow
    app.kubernetes.io/part-of: hybrid-ai-serving-platform
subjects:
  - kind: ServiceAccount
    name: model-build-workflow
    namespace: model-build
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-build-workflow
