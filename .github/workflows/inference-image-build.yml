# 앱 이미지(inference-api/worker, dashboard be/fe)를 빌드하고 Bastion 경유 VPN으로 ECR에 push.
# 직통 egress(OIDC + amazon-ecr-login + docker push) 폐지 → GitHub 러너는 빌드/전송만,
# 실제 ECR push는 private build 노드(10.42)에서 VPN으로 수행(bh ecr-push).

name: Inference Image Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 808379768010.dkr.ecr.ap-northeast-2.amazonaws.com
  BASTION_HOST: ${{ vars.BASTION_HOST }}
  BASTION_PORT: ${{ vars.BASTION_PORT || '22' }}
  BASTION_USER: ${{ vars.BASTION_USER }}
  BASTION_REPO_DIR: ${{ vars.BASTION_REPO_DIR || '~/bastion-host' }}
  PRIVATE_SSH_TARGET: ${{ vars.PRIVATE_SSH_TARGET }}
  PRIVATE_SSH_CONFIG: ${{ vars.PRIVATE_SSH_CONFIG }}

concurrency:
  group: inference-image-dispatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - inference-api
          - inference-worker
          - dashboard-backend
          - dashboard-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate bastion settings
        env:
          BASTION_SSH_KEY: ${{ secrets.BASTION_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${BASTION_HOST}" || { echo "::error::BASTION_HOST variable is required"; exit 1; }
          test -n "${BASTION_USER}" || { echo "::error::BASTION_USER variable is required"; exit 1; }
          test -n "${PRIVATE_SSH_TARGET}" || { echo "::error::PRIVATE_SSH_TARGET variable is required (10.42 build node)"; exit 1; }
          test -n "${BASTION_SSH_KEY}" || { echo "::error::BASTION_SSH_KEY secret is required"; exit 1; }

      - name: Build and save image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -t "${ECR_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${{ matrix.service }}:latest" \
            "services/${{ matrix.service }}"
          mkdir -p "${RUNNER_TEMP}/images"
          docker save \
            "${ECR_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}" \
            "${ECR_REGISTRY}/${{ matrix.service }}:latest" \
            | gzip > "${RUNNER_TEMP}/images/${{ matrix.service }}.tar.gz"

      - name: Configure SSH to bastion
        env:
          BASTION_SSH_KEY: ${{ secrets.BASTION_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${BASTION_SSH_KEY}" > ~/.ssh/bastion_key
          chmod 0600 ~/.ssh/bastion_key
          ssh-keyscan -p "${BASTION_PORT}" -H "${BASTION_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship image to bastion and push to ECR over VPN
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh_opts=(-i ~/.ssh/bastion_key -p "${BASTION_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes)
          remote_stage="hybrid-ai-ecr-stage"
          tar="${{ matrix.service }}.tar.gz"

          ssh "${ssh_opts[@]}" "${BASTION_USER}@${BASTION_HOST}" "mkdir -p ${remote_stage}"
          scp "${ssh_opts[@]}" "${RUNNER_TEMP}/images/${tar}" \
            "${BASTION_USER}@${BASTION_HOST}:${remote_stage}/${tar}"

          # private build 노드(10.42)에서 VPN으로 push. ECR 호스트가 공인 IP면 ecr-push.sh가 중단.
          ssh_config_arg=""
          [[ -n "${PRIVATE_SSH_CONFIG}" ]] && ssh_config_arg="--ssh-config '${PRIVATE_SSH_CONFIG}'"
          ssh "${ssh_opts[@]}" "${BASTION_USER}@${BASTION_HOST}" \
            "cd ${BASTION_REPO_DIR} && ./bh ecr-push \
               --target '${PRIVATE_SSH_TARGET}' \
               --ecr-registry '${ECR_REGISTRY}' \
               --region '${AWS_REGION}' \
               ${ssh_config_arg} \
               --image-tar '${remote_stage}/${tar}'"
