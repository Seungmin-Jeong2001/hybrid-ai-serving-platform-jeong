name: Private Cloud Foundation Core

on:
  workflow_call:
    inputs:
      action:
        description: Action to perform
        required: true
        type: string
      install_openstack:
        description: Install DevStack (OpenStack) on the runner
        required: true
        type: boolean
      bootstrap_kubernetes:
        description: Bootstrap k8s on OpenStack nodes
        required: true
        type: boolean
      apply_kubernetes:
        description: Apply baseline Kubernetes manifests after bootstrap
        required: true
        type: boolean
      setup_storage:
        description: Setup MinIO and NFS storage
        required: true
        type: boolean
      validate_gpu:
        description: Validate GPU passthrough and run tests
        required: true
        type: boolean
      minio_volume_size:
        description: MinIO volume size per disk (Gi)
        required: true
        type: string
      force_cleanup:
        description: Force cleanup all resources including running DevStack
        required: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_ACTION: ${{ inputs.action }}
  INSTALL_OPENSTACK: ${{ inputs.install_openstack && 'true' || 'false' }}
  BOOTSTRAP_KUBERNETES: ${{ inputs.bootstrap_kubernetes && 'true' || 'false' }}
  APPLY_KUBERNETES: ${{ inputs.apply_kubernetes && 'true' || 'false' }}
  # OpenStack settings from GitHub Variables/Secrets
  OS_AUTH_URL: ${{ vars.OPENSTACK_AUTH_URL }}
  OS_USERNAME: ${{ vars.OPENSTACK_USERNAME }}
  OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
  OS_PROJECT_NAME: ${{ vars.OPENSTACK_PROJECT_NAME }}
  OS_USER_DOMAIN_NAME: ${{ vars.OPENSTACK_USER_DOMAIN_NAME }}
  OS_PROJECT_DOMAIN_NAME: ${{ vars.OPENSTACK_PROJECT_DOMAIN_NAME }}
  OS_REGION_NAME: ${{ vars.OPENSTACK_REGION }}
  OS_IDENTITY_API_VERSION: "3"
  # DevStack password (used when installing)
  HA_DEVSTACK_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
  # DNS settings
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
  PRIVATE_CLOUD_BASE_DOMAIN: ${{ vars.PRIVATE_CLOUD_BASE_DOMAIN }}
  PRIVATE_CLOUD_TAILSCALE_IP: ${{ vars.PRIVATE_CLOUD_TAILSCALE_IP }}
  PRIVATE_CLOUD_DNS_TTL: ${{ vars.PRIVATE_CLOUD_DNS_TTL }}
  PRIVATE_CLOUD_DNS_SERVICES: ${{ vars.PRIVATE_CLOUD_DNS_SERVICES }}
  # Terraform backend
  TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
  TF_BACKEND_TYPE: ${{ vars.TF_BACKEND_TYPE }}
  PRIVATE_CLOUD_TFVARS: ${{ secrets.PRIVATE_CLOUD_TFVARS }}
  # SSH keys
  PRIVATE_CLOUD_SSH_PUBLIC_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
  PRIVATE_CLOUD_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PRIVATE_KEY }}
  PRIVATE_CLOUD_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER }}
  PRIVATE_CLOUD_KUBECONFIG_B64: ${{ secrets.PRIVATE_CLOUD_KUBECONFIG_B64 }}
  # Terraform variables
  TF_VAR_ssh_public_key: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
  TF_VAR_control_plane_image_name: ${{ vars.CONTROL_PLANE_IMAGE_NAME }}
  TF_VAR_control_plane_flavor_name: ${{ vars.CONTROL_PLANE_FLAVOR_NAME }}
  TF_VAR_build_worker_image_name: ${{ vars.BUILD_WORKER_IMAGE_NAME }}
  TF_VAR_build_worker_flavor_name: ${{ vars.BUILD_WORKER_FLAVOR_NAME }}
  TF_VAR_gpu_worker_image_name: ${{ vars.GPU_WORKER_IMAGE_NAME }}
  TF_VAR_gpu_worker_flavor_name: ${{ vars.GPU_WORKER_FLAVOR_NAME }}

jobs:
  install-openstack:
    name: Install OpenStack (DevStack)
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    if: ${{ inputs.install_openstack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate DevStack password policy
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          password = os.environ.get("HA_DEVSTACK_PASSWORD", "")
          errors = []
          if not password:
              errors.append("OPENSTACK_PASSWORD is required for local DevStack installs")
          if len(password) < 8:
              errors.append("OPENSTACK_PASSWORD must be at least 8 characters")
          if len(password) > 128:
              errors.append("OPENSTACK_PASSWORD must be 128 characters or fewer")
          if any(ch.isspace() for ch in password):
              errors.append("OPENSTACK_PASSWORD must not contain whitespace")
          if password and not re.fullmatch(r"[A-Za-z0-9._~!-]+", password):
              errors.append(
                  "OPENSTACK_PASSWORD contains characters outside the DevStack-safe set: "
                  "letters, digits, dot, underscore, hyphen, tilde, exclamation"
              )

          if errors:
              for error in errors:
                  print(f"::error::{error}", file=sys.stderr)
              sys.exit(1)

          print("ok: OPENSTACK_PASSWORD satisfies local DevStack policy")
          PY

      - name: Check existing DevStack
        id: check_devstack
        run: |
          if lxc info ha-openstack >/dev/null 2>&1; then
            echo "container_exists=true" >> "$GITHUB_OUTPUT"
            echo "Container ha-openstack exists"
            
            # Check if DevStack is actually running. Apache can return 503 while
            # Keystone's uwsgi socket is missing, so require the version payload.
            if lxc exec ha-openstack -- curl -fsS http://localhost/identity/v3 2>/dev/null | grep -q "v3.14"; then
              echo "devstack_running=true" >> "$GITHUB_OUTPUT"
              echo "DevStack is already running - skipping installation"
            else
              echo "devstack_running=false" >> "$GITHUB_OUTPUT"
              echo "Container exists but Keystone is not ready - will reinstall"
            fi
          else
            echo "container_exists=false" >> "$GITHUB_OUTPUT"
            echo "devstack_running=false" >> "$GITHUB_OUTPUT"
            echo "DevStack container not found - will create and install"
          fi

      - name: Force cleanup DevStack
        id: force_cleanup_devstack
        if: inputs.action != 'destroy' && inputs.force_cleanup && steps.check_devstack.outputs.container_exists == 'true'
        run: |
          echo "FORCE CLEANUP: Stopping and removing DevStack container..."
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "ran=true" >> "$GITHUB_OUTPUT"
          echo "DevStack container removed"

      - name: Cleanup existing DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' && steps.check_devstack.outputs.container_exists == 'true' && !inputs.force_cleanup
        run: |
          echo "Cleaning up incomplete DevStack installation..."
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "Cleanup complete"

      - name: Skip DevStack installation
        if: steps.check_devstack.outputs.devstack_running == 'true' && steps.force_cleanup_devstack.outputs.ran != 'true'
        run: |
          echo "DevStack is already running - skipping all installation steps"
          echo "DevStack ready at: http://$(lxc exec ha-openstack -- ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')/identity/v3"

      - name: Create LXC container for DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          configure_lxc_devices() {
            kernel_modules_source="$(readlink -f /lib/modules)"
            lxc config device add ha-openstack kmsg unix-char source=/dev/kmsg path=/dev/kmsg >/dev/null 2>&1 || true
            lxc config device remove ha-openstack host-kernel-modules >/dev/null 2>&1 || true
            lxc config device add ha-openstack host-kernel-modules disk source="$kernel_modules_source" path=/usr/lib/modules readonly=true >/dev/null 2>&1 || true
            if [[ -e /dev/kvm ]]; then
              lxc config device add ha-openstack kvm unix-char source=/dev/kvm path=/dev/kvm >/dev/null 2>&1 || true
            fi
          }

          if lxc info ha-openstack >/dev/null 2>&1; then
            echo "Container ha-openstack already exists, skipping creation"
            raw_lxc=$(printf 'lxc.apparmor.profile=unconfined\nlxc.cap.drop=\nlxc.mount.auto=proc:rw sys:rw cgroup:rw')
            lxc config set ha-openstack security.nesting true
            lxc config set ha-openstack security.privileged true
            lxc config set ha-openstack raw.lxc "$raw_lxc"
            configure_lxc_devices
            lxc start ha-openstack 2>/dev/null || true
          else
            echo "Creating DevStack container..."
            raw_lxc=$(printf 'lxc.apparmor.profile=unconfined\nlxc.cap.drop=\nlxc.mount.auto=proc:rw sys:rw cgroup:rw')
            lxc init ubuntu:24.04 ha-openstack \
              -c security.nesting=true \
              -c security.privileged=true \
              -c raw.lxc="$raw_lxc"
            configure_lxc_devices
            lxc start ha-openstack
            echo "Container created and started"
          fi
          sleep 5
          lxc list | grep ha-openstack

      - name: Install DevStack prerequisites
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          echo "Installing prerequisites..."
          lxc exec ha-openstack -- bash -s <<'INSTALL_DEVSTACK_PREREQS'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          wait_for_apt_locks() {
            local lock
            local busy
            local deadline=$((SECONDS + 600))
            local -a locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )

            while true; do
              busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              elif pgrep -x apt >/dev/null 2>&1 || pgrep -x apt-get >/dev/null 2>&1 || pgrep -x dpkg >/dev/null 2>&1 || pgrep -x unattended-upgrade >/dev/null 2>&1; then
                busy=1
              fi

              [[ "$busy" -eq 0 ]] && return
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                ps -eo pid,comm,args | grep -E 'apt|dpkg|unattended-upgrade' >&2 || true
                return 1
              fi
              echo "Waiting for apt/dpkg lock to be released..."
              sleep 5
            done
          }

          apt_get() {
            wait_for_apt_locks
            apt-get -o DPkg::Lock::Timeout=600 "$@"
          }

          if command -v cloud-init >/dev/null 2>&1; then
            cloud-init status --wait >/dev/null 2>&1 || true
          fi

          apt_get update -qq
          apt_get install -y -qq git sudo curl ca-certificates iproute2 net-tools kmod openssh-client netcat-openbsd python3-openstackclient
          id stack &>/dev/null || useradd -s /bin/bash -d /opt/stack -m stack
          chmod +x /opt/stack
          echo "stack ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/stack
          chmod 440 /etc/sudoers.d/stack
          chown -R stack:stack /opt/stack
          echo "Prerequisites installed"
          INSTALL_DEVSTACK_PREREQS

      - name: Clone DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -c '
            git clone --depth=1 --branch master https://opendev.org/openstack/devstack /opt/stack/devstack
            echo "DevStack cloned"
          '

      - name: Configure DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          IP=$(lxc exec ha-openstack -- ip -4 addr show eth0 | grep -oP "(?<=inet\s)\d+(\.\d+){3}")
          echo "Configuring DevStack with IP: $IP"
          
          # Create local.conf inside container with all passwords set
          lxc exec ha-openstack -- sudo -u stack -H bash -c "mkdir -p /opt/stack/devstack"
          
          printf '%s' "${HA_DEVSTACK_PASSWORD}" \
            | lxc exec ha-openstack -- sudo -u stack -H bash -c 'umask 077 && cat > /opt/stack/devstack/.devstack-password'

          # Write local.conf without putting the password in the process list.
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- "$IP" <<'WRITE_LOCAL_CONF'
          set -euo pipefail
          IP="$1"
          PASSWORD=$(cat /opt/stack/devstack/.devstack-password)
          {
            printf '%s\n' '[[local|localrc]]'
            printf 'ADMIN_PASSWORD=%s\n' "$PASSWORD"
            printf 'DATABASE_PASSWORD=%s\n' "$PASSWORD"
            printf 'RABBIT_PASSWORD=%s\n' "$PASSWORD"
            printf 'SERVICE_PASSWORD=%s\n' "$PASSWORD"
            printf 'SERVICE_TOKEN=%s\n' "$PASSWORD"
            printf 'MYSQL_PASSWORD=%s\n' "$PASSWORD"
            printf 'HOST_IP=%s\n' "$IP"
            printf 'SERVICE_HOST=%s\n' "$IP"
            printf '%s\n' 'LOGFILE=/opt/stack/logs/stack.sh.log'
            printf '%s\n' 'LOG_COLOR=False'
            printf '%s\n' 'VERBOSE=True'
            printf '%s\n' 'LIBVIRT_TYPE=qemu'
            printf '%s\n' 'ENABLE_VOLUME_BACKING_FILE=True'
            printf '%s\n' 'disable_service tempest'
            printf '%s\n' 'disable_service swift'
            printf '%s\n' 'disable_service cinder'
            printf '%s\n' 'ENABLE_KSM=False'
          } > /opt/stack/devstack/local.conf
          WRITE_LOCAL_CONF
          
          lxc exec ha-openstack -- chown stack:stack /opt/stack/devstack/local.conf
          lxc exec ha-openstack -- chmod 600 /opt/stack/devstack/local.conf
          echo "local.conf created"

      - name: Patch DevStack for KSM
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        run: |
          lxc exec ha-openstack -- sed -i 's/^function configure_ksm {/function configure_ksm {\n    return 0/' /opt/stack/devstack/lib/host
          echo "DevStack patched to skip KSM"

      - name: Run DevStack
        if: steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true'
        timeout-minutes: 180
        run: |
          echo "Starting DevStack installation (this can take 30-90 minutes on nested LXD)..."
          lxc exec ha-openstack -- sudo -u stack -H bash -s <<'RUN_DEVSTACK'
          set -euo pipefail
          cd /opt/stack/devstack
          trap 'rm -f /opt/stack/devstack/.devstack-password' EXIT
          export FORCE=yes
          ./stack.sh < /dev/null
          RUN_DEVSTACK
          echo "DevStack installation complete"

      - name: Dump DevStack diagnostics
        if: failure() && (steps.check_devstack.outputs.devstack_running == 'false' || steps.force_cleanup_devstack.outputs.ran == 'true')
        run: |
          echo "::group::DevStack stack.sh.log"
          lxc exec ha-openstack -- bash -lc 'tail -n 240 /opt/stack/logs/stack.sh.log 2>/dev/null || true'
          echo "::endgroup::"

          echo "::group::DevStack systemd units"
          lxc exec ha-openstack -- bash -lc 'systemctl --no-pager --failed || true'
          lxc exec ha-openstack -- bash -lc 'systemctl --no-pager --type=service "devstack@*" || true'
          echo "::endgroup::"

          echo "::group::Nova service journals"
          # shellcheck disable=SC2016
          lxc exec ha-openstack -- bash -lc 'for unit in devstack@n-api.service devstack@n-api-meta.service devstack@n-cpu.service devstack@n-cond.service devstack@n-sch.service devstack@n-novnc-cell1.service; do echo "### ${unit}"; journalctl -u "${unit}" --no-pager -n 120 2>/dev/null || true; done'
          echo "::endgroup::"

      - name: Configure Horizon proxy settings
        run: |
          horizon_domain="openstack.${PRIVATE_CLOUD_BASE_DOMAIN}"
          lxc exec ha-openstack -- bash -s -- "$horizon_domain" <<'CONFIGURE_HORIZON'
          set -euo pipefail
          horizon_domain="$1"
          settings="/opt/stack/horizon/openstack_dashboard/local/local_settings.py"
          python3 - "$settings" "$horizon_domain" <<'PY'
          import sys

          settings, horizon_domain = sys.argv[1], sys.argv[2]
          begin = "# BEGIN hybrid-ai Horizon proxy settings"
          end = "# END hybrid-ai Horizon proxy settings"
          with open(settings, "r", encoding="utf-8") as handle:
              content = handle.read()
          if begin in content and end in content:
              before, rest = content.split(begin, 1)
              _, after = rest.split(end, 1)
              content = before + after.lstrip("\n")
          origins = [
              f"http://{horizon_domain}",
              f"https://{horizon_domain}",
              "http://127.0.0.1:18081",
              "http://localhost:18081",
          ]
          block = f"""
          {begin}
          USE_X_FORWARDED_HOST = True
          SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")
          CSRF_TRUSTED_ORIGINS = {origins!r}
          {end}
          """
          with open(settings, "w", encoding="utf-8") as handle:
              handle.write(content.rstrip() + "\n" + block.lstrip())
          PY
          systemctl reload apache2
          CONFIGURE_HORIZON
          echo "Horizon proxy settings configured for ${horizon_domain}"

      - name: Ensure DevStack Ubuntu image
        run: |
          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${TF_VAR_control_plane_image_name}" \
            "${TF_VAR_build_worker_image_name}" \
            "${TF_VAR_gpu_worker_image_name}" <<'ENSURE_IMAGE'
          set -eo pipefail
          cd /opt/stack/devstack
          source openrc admin admin >/dev/null
          set -u

          ensure_image() {
            local image_name="$1"
            local image_url=""
            local image_file=""

            [[ -n "$image_name" ]] || return 0
            if openstack image show "$image_name" >/dev/null 2>&1; then
              echo "Image already exists: $image_name"
              return 0
            fi

            case "$image_name" in
              ubuntu-22.04)
                image_url="https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
                image_file="/opt/stack/images/jammy-server-cloudimg-amd64.img"
                ;;
              ubuntu-24.04)
                image_url="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
                image_file="/opt/stack/images/noble-server-cloudimg-amd64.img"
                ;;
              *)
                echo "::error::Image $image_name does not exist in DevStack and no download URL is configured for it"
                return 1
                ;;
            esac

            mkdir -p /opt/stack/images
            if [[ ! -f "$image_file" ]]; then
              echo "Downloading image $image_name..."
              curl -fL --retry 3 --retry-delay 5 -o "$image_file" "$image_url"
            fi

            echo "Uploading image $image_name to Glance..."
            openstack image create "$image_name" \
              --disk-format qcow2 \
              --container-format bare \
              --public \
              --file "$image_file"
          }

          seen=" "
          for image_name in "$@"; do
            if [[ "$seen" == *" $image_name "* ]]; then
              continue
            fi
            seen="${seen}${image_name} "
            ensure_image "$image_name"
          done
          ENSURE_IMAGE

      - name: Ensure configured OpenStack project and user
        run: |
          if [[ -z "${OS_USERNAME:-}" || -z "${OS_PASSWORD:-}" || -z "${OS_PROJECT_NAME:-}" ]]; then
            echo "::error::OPENSTACK_USERNAME, OPENSTACK_PASSWORD, and OPENSTACK_PROJECT_NAME are required"
            exit 1
          fi

          printf '%s' "${OS_PASSWORD}" \
            | lxc exec ha-openstack -- sudo -u stack -H bash -c 'umask 077 && cat > /opt/stack/devstack/.configured-openstack-password'

          lxc exec ha-openstack -- sudo -u stack -H bash -s -- \
            "${OS_USERNAME}" \
            "${OS_PROJECT_NAME}" \
            "${OS_USER_DOMAIN_NAME:-Default}" \
            "${OS_PROJECT_DOMAIN_NAME:-Default}" <<'ENSURE_OPENSTACK_TENANT'
          set -euo pipefail
          cd /opt/stack/devstack
          set +u
          source openrc admin admin >/dev/null
          set -u

          user_name="$1"
          project_name="$2"
          user_domain="$3"
          project_domain="$4"
          password_file=/opt/stack/devstack/.configured-openstack-password
          trap 'rm -f "$password_file"' EXIT
          password="$(cat "$password_file")"

          openstack domain show "$user_domain" >/dev/null
          openstack domain show "$project_domain" >/dev/null

          openstack project create \
            --domain "$project_domain" \
            --description "Hybrid AI private cloud project managed by GitHub Actions" \
            --or-show \
            "$project_name" >/dev/null

          if openstack user show --domain "$user_domain" "$user_name" >/dev/null 2>&1; then
            openstack user set \
              --domain "$user_domain" \
              --project "$project_name" \
              --project-domain "$project_domain" \
              --password "$password" \
              --enable \
              "$user_name"
          else
            openstack user create \
              --domain "$user_domain" \
              --project "$project_name" \
              --project-domain "$project_domain" \
              --password "$password" \
              --enable \
              "$user_name" >/dev/null
          fi

          openstack role add member \
            --user "$user_name" \
            --user-domain "$user_domain" \
            --project "$project_name" \
            --project-domain "$project_domain"

          openstack quota set \
            --instances 10 \
            --cores 20 \
            --ram 51200 \
            --key-pairs 100 \
            --floating-ips -1 \
            --secgroups -1 \
            --secgroup-rules -1 \
            --networks 20 \
            --subnets 20 \
            --ports 200 \
            --routers 20 \
            "$project_name" || true

          if openstack network show public >/dev/null 2>&1; then
            openstack network set --share public || true
          fi

          echo "ok: ensured OpenStack project '$project_name' and user '$user_name'"
          ENSURE_OPENSTACK_TENANT

      - name: Ensure DevStack SSH proxy tools
        run: |
          lxc exec ha-openstack -- bash -s <<'ENSURE_PROXY_TOOLS'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          wait_for_apt_locks() {
            local lock
            local busy
            local deadline=$((SECONDS + 600))
            local -a locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )

            while true; do
              busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              elif pgrep -x apt >/dev/null 2>&1 || pgrep -x apt-get >/dev/null 2>&1 || pgrep -x dpkg >/dev/null 2>&1 || pgrep -x unattended-upgrade >/dev/null 2>&1; then
                busy=1
              fi

              [[ "$busy" -eq 0 ]] && return
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                ps -eo pid,comm,args | grep -E 'apt|dpkg|unattended-upgrade' >&2 || true
                return 1
              fi
              echo "Waiting for apt/dpkg lock to be released..."
              sleep 5
            done
          }

          apt_get() {
            wait_for_apt_locks
            apt-get -o DPkg::Lock::Timeout=600 "$@"
          }

          missing=0
          command -v nc >/dev/null 2>&1 || missing=1
          command -v ssh >/dev/null 2>&1 || missing=1
          if [[ "$missing" -eq 1 ]]; then
            apt_get update -qq
            apt_get install -y -qq netcat-openbsd openssh-client
          fi
          ENSURE_PROXY_TOOLS

      - name: Verify DevStack
        if: always()
        run: |
          echo "Verifying DevStack..."
          if ! lxc info ha-openstack >/dev/null 2>&1; then
            echo "::error::DevStack container not found"
            exit 1
          fi
          IP=$(lxc exec ha-openstack -- ip -4 addr show eth0 2>/dev/null | grep -oP "(?<=inet\s)\d+(\.\d+){3}" || echo "")
          if [[ -z "$IP" ]]; then
            echo "::error::Could not get container IP"
            exit 1
          fi
          if lxc exec ha-openstack -- curl -fsS http://localhost/identity/v3 | grep -q "v3.14"; then
            echo "Keystone is running"
          else
            echo "::error::Keystone not responding"
            exit 1
          fi
          echo "DevStack is ready at http://${IP}/identity/v3"

      - name: Ensure proxy device
        if: always()
        run: |
          if ! lxc info ha-openstack >/dev/null 2>&1; then
            echo "DevStack container not found - skipping proxy setup"
            exit 0
          fi
          lxc config device add ha-openstack horizon-proxy proxy listen=tcp:0.0.0.0:18081 connect=tcp:127.0.0.1:80 2>/dev/null || true
          echo "Proxy configured"

  terraform:
    name: Terraform OpenStack
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    needs: install-openstack
    if: always() && (needs.install-openstack.result == 'success' || needs.install-openstack.result == 'skipped')
    env:
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-destroy-ssh
      HA_OPENSTACK_SSH_CONFIG: /tmp/private-cloud-destroy-ssh-config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    defaults:
      run:
        working-directory: private/openstack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for DevStack
        if: ${{ inputs.install_openstack }}
        run: |
          echo "Waiting for DevStack to be ready..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18081/identity/v3 | grep -q "v3.14"; then
              echo "DevStack is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "::error::DevStack did not become ready on http://127.0.0.1:18081/identity/v3"
          exit 1

      - name: Check Terraform job tools
        run: |
          missing=0
          for tool in curl python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${TERRAFORM_ACTION}" == "destroy" && "${INSTALL_OPENSTACK}" == "true" ]]; then
            for tool in ssh lxc; do
              if ! command -v "$tool" >/dev/null 2>&1; then
                echo "::error::Missing required runner tool for local DevStack destroy cleanup: ${tool}"
                missing=1
              fi
            done
          fi
          exit "${missing}"

      - name: Setup Terraform
        env:
          TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.8.5' }}
        run: |
          if command -v terraform >/dev/null 2>&1; then
            terraform version
            exit 0
          fi

          case "$(uname -m)" in
            x86_64|amd64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *) echo "::error::Unsupported runner architecture: $(uname -m)"; exit 1 ;;
          esac

          bin_dir="${RUNNER_TEMP}/terraform-bin"
          zip_file="${RUNNER_TEMP}/terraform.zip"
          mkdir -p "$bin_dir"
          curl -fsSL \
            -o "$zip_file" \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_${arch}.zip"
          python3 - "$zip_file" "$bin_dir" <<'PY'
          import sys
          import zipfile

          zip_file, bin_dir = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(zip_file) as archive:
              archive.extract("terraform", bin_dir)
          PY
          chmod +x "${bin_dir}/terraform"
          echo "$bin_dir" >> "$GITHUB_PATH"
          "${bin_dir}/terraform" version

      - name: Prepare OpenStack environment
        run: |
          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            echo "Using GitHub-configured OpenStack credentials for local DevStack tenant login"
          fi

      - name: Validate required configuration
        run: |
          missing=0
          for name in OS_AUTH_URL OS_USERNAME OS_PASSWORD OS_PROJECT_NAME OS_USER_DOMAIN_NAME OS_PROJECT_DOMAIN_NAME TF_VAR_ssh_public_key; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret or variable: ${name}"
              missing=1
            fi
          done
          if [[ -z "${TF_BACKEND_CONFIG:-}" ]]; then
            if [[ "${TERRAFORM_ACTION}" == "plan" ]]; then
              echo "::warning::TF_BACKEND_CONFIG is empty; plan will not use a remote Terraform state backend"
            else
              echo "::error::TF_BACKEND_CONFIG is required for ${TERRAFORM_ACTION} so state is shared across runs"
              missing=1
            fi
          fi
          exit "${missing}"

      - name: Verify OpenStack login
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          auth_url = os.environ["OS_AUTH_URL"].rstrip("/")
          if not auth_url.endswith("/v3"):
              auth_url = f"{auth_url}/v3"

          payload = {
              "auth": {
                  "identity": {
                      "methods": ["password"],
                      "password": {
                          "user": {
                              "name": os.environ["OS_USERNAME"],
                              "domain": {"name": os.environ["OS_USER_DOMAIN_NAME"]},
                              "password": os.environ["OS_PASSWORD"],
                          }
                      },
                  },
                  "scope": {
                      "project": {
                          "name": os.environ["OS_PROJECT_NAME"],
                          "domain": {"name": os.environ["OS_PROJECT_DOMAIN_NAME"]},
                      }
                  },
              }
          }

          request = urllib.request.Request(
              f"{auth_url}/auth/tokens",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status not in (200, 201):
                      print(f"Unexpected Keystone status: {response.status}", file=sys.stderr)
                      sys.exit(1)
          except urllib.error.HTTPError as exc:
              print(f"OpenStack Keystone login failed: HTTP {exc.code}", file=sys.stderr)
              sys.exit(1)
          except Exception as exc:
              print(f"OpenStack Keystone login failed: {type(exc).__name__}: {exc}", file=sys.stderr)
              sys.exit(1)

          print("ok: OpenStack Keystone login")
          PY

      - name: Write Terraform variable overrides
        run: |
          if [[ -n "${PRIVATE_CLOUD_TFVARS:-}" ]]; then
            printf '%s' "${PRIVATE_CLOUD_TFVARS}" > private-cloud.auto.tfvars
            echo "Wrote Terraform variable overrides from PRIVATE_CLOUD_TFVARS"
          fi

          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            public_network_id=$(lxc exec ha-openstack -- sudo -u stack -H bash -lc \
              'cd /opt/stack/devstack && source openrc admin admin >/dev/null && openstack network show public -f value -c id')
            {
              printf 'external_network_id = "%s"\n' "$public_network_id"
              printf 'floating_ip_pool = "public"\n'
              printf 'assign_floating_ips = true\n'
              printf 'control_plane_image_name = "%s"\n' "${TF_VAR_control_plane_image_name}"
              printf 'build_worker_image_name = "%s"\n' "${TF_VAR_build_worker_image_name}"
              printf 'gpu_worker_image_name = "%s"\n' "${TF_VAR_gpu_worker_image_name}"
            } > zz-local-devstack.auto.tfvars
            echo "Wrote Terraform DevStack overrides for local OpenStack"
          fi

      - name: Terraform init
        run: |
          if [[ -n "${TF_BACKEND_CONFIG}" ]]; then
            printf "terraform {\n  backend \"%s\" {}\n}\n" "${TF_BACKEND_TYPE}" > backend.generated.tf
            printf "%s" "${TF_BACKEND_CONFIG}" > backend.hcl
            terraform init -backend-config=backend.hcl
          else
            terraform init
          fi

      - name: Setup kubectl for destroy cleanup
        if: ${{ inputs.action == 'destroy' }}
        uses: azure/setup-kubectl@v4

      - name: Pre-destroy Kubernetes cleanup
        if: ${{ inputs.action == 'destroy' }}
        env:
          KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
        run: |
          mkdir -p "$(dirname "$KUBECONFIG")"
          if [[ -n "${PRIVATE_CLOUD_KUBECONFIG_B64:-}" ]]; then
            printf '%s' "${PRIVATE_CLOUD_KUBECONFIG_B64}" | base64 -d > "$KUBECONFIG"
            chmod 600 "$KUBECONFIG"
          elif [[ -f "$KUBECONFIG" ]]; then
            echo "Using existing kubeconfig at $KUBECONFIG"
          else
            echo "::notice::No PRIVATE_CLOUD_KUBECONFIG_B64 or existing kubeconfig found; skipping Kubernetes cleanup before destroy"
            exit 0
          fi

          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
              echo "::notice::PRIVATE_CLOUD_SSH_PRIVATE_KEY is empty; skipping local DevStack kubectl tunnel"
            elif terraform output -json > /tmp/destroy-tf-output.json 2>/dev/null; then
              first_cp_ip=$(python3 - <<'PY'
          import json
          with open('/tmp/destroy-tf-output.json', 'r', encoding='utf-8') as handle:
              data = json.load(handle)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip') or '')
          PY
              )
              if [[ -n "$first_cp_ip" ]]; then
                mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
                printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
                chmod 600 "$HA_OPENSTACK_SSH_KEY"
                {
                  printf 'Host *\n'
                  printf '  User %s\n' "${PRIVATE_CLOUD_SSH_USER}"
                  printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
                  printf '  BatchMode yes\n'
                  printf '  StrictHostKeyChecking no\n'
                  printf '  CheckHostIP no\n'
                  printf '  UserKnownHostsFile /dev/null\n'
                  printf '  LogLevel ERROR\n'
                  printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
                } > "$HA_OPENSTACK_SSH_CONFIG"
                chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
                pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
                ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
                  -fN \
                  -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
                  "$first_cp_ip"
                sed -i -E "s#server: https://[^[:space:]]+#server: https://127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}#" "$KUBECONFIG"
              else
                echo "::notice::Terraform output did not contain a control-plane IP; skipping local DevStack kubectl tunnel"
              fi
            else
              echo "::notice::Terraform output is not available; skipping local DevStack kubectl tunnel"
            fi
          fi

          if ! kubectl --request-timeout=20s get nodes >/dev/null 2>&1; then
            echo "::notice::Kubernetes API is not reachable; continuing Terraform destroy"
            exit 0
          fi

          echo "Cleaning up Kubernetes resources before Terraform destroy..."
          kubectl delete jobs --all --all-namespaces --ignore-not-found=true --timeout=60s || true
          kubectl delete deployments --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete statefulsets --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete daemonsets --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete pvc --all --all-namespaces --ignore-not-found=true --timeout=120s || true
          kubectl delete pv --all --ignore-not-found=true --timeout=120s || true
          kubectl get namespaces -o name \
            | grep -vE 'kube-system|kube-public|kube-node-lease|default' \
            | xargs -r kubectl delete --timeout=120s || true
          echo "Kubernetes cleanup complete"

      - name: Terraform plan
        run: |
          if [[ "${TERRAFORM_ACTION}" == "destroy" ]]; then
            terraform plan -destroy -out=private-cloud.tfplan
          else
            terraform plan -out=private-cloud.tfplan
          fi

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' || inputs.action == 'destroy' }}
        run: terraform apply -auto-approve private-cloud.tfplan

      - name: Export Terraform outputs
        if: ${{ inputs.action == 'apply' }}
        run: |
          mkdir -p "${RUNNER_TEMP}/private-cloud"
          terraform output -json > "${RUNNER_TEMP}/private-cloud/terraform-output.json"

      - name: Upload Terraform outputs
        if: ${{ inputs.action == 'apply' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-output
          path: ${{ runner.temp }}/private-cloud/terraform-output.json
          retention-days: 1

      - name: Cleanup Terraform sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG"
          rm -f backend.generated.tf backend.hcl private-cloud.auto.tfvars zz-local-devstack.auto.tfvars private-cloud.tfplan

  dns:
    name: Configure DNS
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ always() && needs.terraform.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DNS prerequisites
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ZONE_ID PRIVATE_CLOUD_BASE_DOMAIN PRIVATE_CLOUD_TAILSCALE_IP; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret or variable: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Preview, apply, or delete DNS records
        run: |
          args=()
          if [[ "${TERRAFORM_ACTION}" == "apply" ]]; then
            args+=(--apply)
          elif [[ "${TERRAFORM_ACTION}" == "destroy" ]]; then
            args+=(--delete --apply)
          fi
          python3 private/reverse-proxy/cloudflare_dns.py "${args[@]}"

  cleanup-devstack:
    name: Cleanup DevStack Container
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    needs: terraform
    if: ${{ always() && inputs.action == 'destroy' && inputs.install_openstack && inputs.force_cleanup && needs.terraform.result == 'success' }}
    steps:
      - name: Remove DevStack container
        run: |
          lxc stop ha-openstack --force 2>/dev/null || true
          lxc delete ha-openstack --force 2>/dev/null || true
          echo "DevStack container removed"

  bootstrap-k8s:
    name: Bootstrap Kubernetes
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    needs: terraform
    if: ${{ always() && needs.terraform.result == 'success' && inputs.bootstrap_kubernetes && inputs.action == 'apply' }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/ssh_config
      HA_OPENSTACK_KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      HA_KUBECTL_TUNNEL_PORT: "16443"
      HA_K8S_VERSION_MINOR: ${{ vars.PRIVATE_CLOUD_K8S_VERSION_MINOR || 'v1.36' }}
      HA_K8S_POD_CIDR: ${{ vars.PRIVATE_CLOUD_K8S_POD_CIDR || '192.168.0.0/16' }}
      HA_K8S_CNI_MANIFEST: ${{ vars.PRIVATE_CLOUD_K8S_CNI_MANIFEST || 'https://raw.githubusercontent.com/projectcalico/calico/v3.32.0/manifests/calico.yaml' }}
      HA_K8S_API_ENDPOINT: ${{ vars.PRIVATE_CLOUD_K8S_API_ENDPOINT || vars.PRIVATE_CLOUD_TAILSCALE_IP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bootstrap job tools
        run: |
          missing=0
          for tool in ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack SSH proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Download Terraform outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Wait for nodes SSH
        timeout-minutes: 15
        run: |
          echo "Waiting for nodes to be SSH-ready..."
          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json

          python3 - <<'PY' > /tmp/node-inventory.txt
          import json
          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)

          def get_ip(node):
              return node.get('floating_ip') or node.get('private_ip')

          for key in ('control_plane_nodes', 'build_worker_nodes', 'gpu_worker_nodes'):
              for node in data.get(key, {}).get('value', []):
                  ip = get_ip(node)
                  if ip:
                      print(f"{ip} {node.get('name', '')}")
          PY

          if [[ ! -s /tmp/node-inventory.txt ]]; then
            echo "::error::Terraform output did not contain any node IPs"
            exit 1
          fi

          while read -r ip name; do
            echo "Checking $name ($ip)..."
            ready=false
            deadline=$((SECONDS + 600))
            while (( SECONDS < deadline )); do
              if ssh -F "$HA_OPENSTACK_SSH_CONFIG" -n -o ConnectTimeout=10 "$ip" 'true' 2>/dev/null; then
                echo "  $name is ready"
                ready=true
                break
              fi
              sleep 10
            done
            if [[ "$ready" != "true" ]]; then
              echo "::error::$name ($ip) did not become SSH-ready"
              exit 1
            fi
          done < /tmp/node-inventory.txt
          echo "All nodes are SSH-ready"

      - name: Bootstrap Kubernetes nodes
        timeout-minutes: 60
        run: |
          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            export HA_OPENSTACK_SSH_PROXY_CONTAINER="ha-openstack"
            export HA_K8S_API_ENDPOINT="127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"
          fi
          export HA_OPENSTACK_TF_OUTPUT_JSON="${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json"
          export HA_OPENSTACK_SSH_TARGET="auto"
          ../kubernetes-bootstrap/bootstrap-k8s.sh
          echo "Kubernetes bootstrap complete"

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          FIRST_CP_IP=$(python3 - <<'PY'
          import json
          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip'))
          PY
          )
          if [[ -z "$FIRST_CP_IP" ]]; then
            echo "::error::Terraform output did not contain a control-plane IP"
            exit 1
          fi
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "$FIRST_CP_IP"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Verify cluster
        run: |
          export KUBECONFIG="$HA_OPENSTACK_KUBECONFIG"
          kubectl get nodes -o wide
          kubectl get pods -A
          echo "k8s cluster is ready!"

      - name: Apply Kubernetes baseline
        if: ${{ inputs.apply_kubernetes }}
        run: |
          export KUBECONFIG="$HA_OPENSTACK_KUBECONFIG"
          kubectl apply -k ../kubernetes
          echo "Kubernetes baseline applied"

      - name: Upload kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: .ha/openstack/kubeconfig
          retention-days: 1

      - name: Cleanup bootstrap sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG" "$HA_OPENSTACK_KUBECONFIG"

  setup-storage:
    name: Setup Storage (MinIO + NFS)
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    needs: [bootstrap-k8s, terraform]
    if: ${{ always() && needs.bootstrap-k8s.result == 'success' && needs.terraform.result == 'success' && inputs.action == 'apply' && inputs.bootstrap_kubernetes && inputs.setup_storage }}
    defaults:
      run:
        working-directory: private/openstack
    env:
      KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      MINIO_VOLUME_SIZE: ${{ inputs.minio_volume_size || '50' }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-storage-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/storage_ssh_config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check storage job tools
        run: |
          missing=0
          for tool in ssh python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]] && ! command -v lxc >/dev/null 2>&1; then
            echo "::error::Missing required runner tool for local DevStack SSH proxy: lxc"
            missing=1
          fi
          exit "${missing}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: kubeconfig
          path: .ha/openstack

      - name: Download Terraform outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Setup SSH key
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
              printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
            fi
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          echo "SSH key and config configured"

      - name: Get storage inputs
        id: storage
        run: |
          cp "${GITHUB_WORKSPACE}/.ha/openstack/terraform-output.json" /tmp/tf-output.json
          python3 - <<'PY' > /tmp/storage-output.env
          import json
          import sys

          with open('/tmp/tf-output.json', 'r') as f:
              data = json.load(f)

          control_nodes = data.get('control_plane_nodes', {}).get('value', [])
          if not control_nodes:
              print('missing control_plane_nodes output', file=sys.stderr)
              sys.exit(1)

          nfs_server_ip = data.get('nfs_server_ip', {}).get('value')
          private_network_cidr = data.get('private_network_cidr', {}).get('value')
          nfs_ssh_ip = control_nodes[0].get('floating_ip') or control_nodes[0].get('private_ip')
          missing = [name for name, value in {
              'nfs_server_ip': nfs_server_ip,
              'private_network_cidr': private_network_cidr,
              'nfs_ssh_ip': nfs_ssh_ip,
          }.items() if not value]
          if missing:
              print(f"missing Terraform output(s): {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          print(f"NFS_SERVER_IP={nfs_server_ip}")
          print(f"PRIVATE_NETWORK_CIDR={private_network_cidr}")
          print(f"NFS_SSH_IP={nfs_ssh_ip}")
          PY
          cat /tmp/storage-output.env >> "$GITHUB_OUTPUT"
          cat /tmp/storage-output.env

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "${{ steps.storage.outputs.NFS_SSH_IP }}"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Prepare NFS server
        run: |
          echo "Preparing NFS export on ${{ steps.storage.outputs.NFS_SSH_IP }}..."
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            "${{ steps.storage.outputs.NFS_SSH_IP }}" \
            bash -s -- "${{ steps.storage.outputs.PRIVATE_NETWORK_CIDR }}" <<'REMOTE'
          set -euo pipefail
          cidr="$1"
          export DEBIAN_FRONTEND=noninteractive

          wait_for_apt_locks() {
            local lock
            local busy
            local deadline=$((SECONDS + 600))
            local -a locks=(
              /var/lib/dpkg/lock
              /var/lib/dpkg/lock-frontend
              /var/lib/apt/lists/lock
              /var/cache/apt/archives/lock
            )

            while true; do
              busy=0
              if command -v fuser >/dev/null 2>&1; then
                for lock in "${locks[@]}"; do
                  if sudo fuser "$lock" >/dev/null 2>&1; then
                    busy=1
                    break
                  fi
                done
              elif pgrep -x apt >/dev/null 2>&1 || pgrep -x apt-get >/dev/null 2>&1 || pgrep -x dpkg >/dev/null 2>&1 || pgrep -x unattended-upgrade >/dev/null 2>&1; then
                busy=1
              fi

              [[ "$busy" -eq 0 ]] && return
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for apt/dpkg locks" >&2
                ps -eo pid,comm,args | grep -E 'apt|dpkg|unattended-upgrade' >&2 || true
                return 1
              fi
              echo "Waiting for apt/dpkg lock to be released..."
              sleep 5
            done
          }

          apt_get() {
            wait_for_apt_locks
            sudo apt-get -o DPkg::Lock::Timeout=600 "$@"
          }

          if ! sudo test -x /usr/sbin/exportfs; then
            apt_get update -qq
            apt_get install -y -qq nfs-common nfs-kernel-server
          fi
          sudo mkdir -p /mnt/nfs/hybrid-ai
          sudo chown nobody:nogroup /mnt/nfs/hybrid-ai
          sudo chmod 0777 /mnt/nfs/hybrid-ai
          sudo mkdir -p /etc/exports.d
          printf '/mnt/nfs/hybrid-ai %s(rw,sync,no_subtree_check,no_root_squash)\n' "$cidr" \
            | sudo tee /etc/exports.d/hybrid-ai.exports >/dev/null
          sudo /usr/sbin/exportfs -ra
          sudo systemctl enable --now nfs-server 2>/dev/null || sudo systemctl enable --now nfs-kernel-server
          sudo /usr/sbin/exportfs -v
          REMOTE
          echo "NFS server prepared"

      - name: Install MinIO Operator
        run: |
          echo "Installing MinIO Operator..."
          kubectl create namespace minio-operator --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install minio-operator operator \
            --repo https://operator.min.io/ \
            --namespace minio-operator \
            --version 7.1.1 \
            --values ../storage/minio-operator-values.yaml \
            --wait \
            --timeout 10m
          for i in {1..60}; do
            if kubectl get crd tenants.minio.min.io >/dev/null 2>&1; then
              echo "MinIO Tenant CRD is ready"
              break
            fi
            echo "Waiting for MinIO Tenant CRD... ($i/60)"
            sleep 10
          done
          kubectl get crd tenants.minio.min.io
          kubectl wait --for=condition=Established crd/tenants.minio.min.io --timeout=300s
          for i in {1..30}; do
            if kubectl api-resources --api-group=minio.min.io | grep -q '^tenants[[:space:]]'; then
              echo "MinIO Tenant API resource is discoverable"
              break
            fi
            echo "Waiting for MinIO Tenant API discovery... ($i/30)"
            sleep 10
          done
          kubectl api-resources --api-group=minio.min.io | grep '^tenants[[:space:]]'
          for i in {1..30}; do
            if kubectl -n minio-operator get deployment/minio-operator >/dev/null 2>&1; then
              echo "MinIO Operator deployment exists"
              break
            fi
            echo "Waiting for MinIO Operator deployment... ($i/30)"
            sleep 10
          done
          kubectl -n minio-operator rollout status deployment/minio-operator --timeout=600s

          echo "Installing local-path provisioner..."
          kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.36/deploy/local-path-storage.yaml
          kubectl -n local-path-storage rollout status deployment/local-path-provisioner --timeout=600s
          for i in {1..30}; do
            if kubectl get storageclass local-path >/dev/null 2>&1; then
              echo "local-path storage class is ready"
              break
            fi
            echo "Waiting for local-path storage class... ($i/30)"
            sleep 10
          done
          kubectl get storageclass local-path

          minio_root_user="${MINIO_ROOT_USER:-minioadmin}"
          minio_root_password="${MINIO_ROOT_PASSWORD:-}"
          if [[ -z "$minio_root_password" ]]; then
            minio_root_password=$(python3 - <<'PY'
          import secrets

          print(secrets.token_urlsafe(36))
          PY
            )
          fi
          echo "::add-mask::$minio_root_user"
          echo "::add-mask::$minio_root_password"
          printf -v minio_config_env '%s\n%s\n%s' \
            "export MINIO_ROOT_USER=\"${minio_root_user}\"" \
            "export MINIO_ROOT_PASSWORD=\"${minio_root_password}\"" \
            'export MINIO_BROWSER="on"'
          kubectl create namespace minio-tenant --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n minio-tenant create secret generic minio-creds-secret \
            --from-literal=accessKey="$minio_root_user" \
            --from-literal=secretKey="$minio_root_password" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n minio-tenant create secret generic minio-configuration \
            --from-literal=config.env="$minio_config_env" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Installing MinIO tenant with volume size ${MINIO_VOLUME_SIZE}Gi..."
          sed -e "s/storage: 100Gi/storage: ${MINIO_VOLUME_SIZE}Gi/g" ../storage/minio-tenant.yaml | kubectl apply -f -
          for i in {1..30}; do
            if kubectl -n minio-tenant get service/minio >/dev/null 2>&1; then
              kubectl -n minio-tenant patch service minio \
                --type=merge \
                -p '{"spec":{"publishNotReadyAddresses":true}}'
              break
            fi
            echo "Waiting for MinIO service before endpoint bootstrap patch... ($i/30)"
            sleep 5
          done
          kubectl -n minio-tenant get service/minio
          kubectl -n minio-tenant get tenant hybrid-ai
          echo "MinIO tenant applied"

      - name: Wait for MinIO Tenant
        timeout-minutes: 20
        run: |
          echo "Waiting for MinIO tenant to be ready..."
          for i in {1..60}; do
            pod_count=$(kubectl get pods -n minio-tenant -l v1.min.io/tenant=hybrid-ai --no-headers 2>/dev/null | wc -l | tr -d '[:space:]')
            if [[ "${pod_count:-0}" -gt 0 ]]; then
              echo "MinIO tenant pods created: ${pod_count}"
              break
            fi
            echo "Waiting for MinIO tenant pods... ($i/60)"
            kubectl -n minio-tenant describe tenant hybrid-ai || true
            sleep 10
          done
          kubectl get pods -n minio-tenant -l v1.min.io/tenant=hybrid-ai
          for i in {1..60}; do
            state="$(kubectl -n minio-tenant get tenant hybrid-ai -o jsonpath='{.status.currentState}' 2>/dev/null || true)"
            health="$(kubectl -n minio-tenant get tenant hybrid-ai -o jsonpath='{.status.healthStatus}' 2>/dev/null || true)"
            not_ready_minio_containers="$(
              kubectl -n minio-tenant get pods -l v1.min.io/tenant=hybrid-ai \
                -o jsonpath='{range .items[*]}{range .status.containerStatuses[?(@.name=="minio")]}{.ready}{"\n"}{end}{end}' \
                | grep -vc '^true$' || true
            )"
            if [[ "$state" == "Initialized" && "$health" == "green" && "${not_ready_minio_containers:-1}" -eq 0 ]]; then
              echo "MinIO tenant is initialized and MinIO containers are ready"
              break
            fi
            echo "Waiting for MinIO tenant initialization: state=${state:-unknown}, health=${health:-unknown}, not_ready_minio_containers=${not_ready_minio_containers:-unknown} ($i/60)"
            sleep 10
          done
          state="$(kubectl -n minio-tenant get tenant hybrid-ai -o jsonpath='{.status.currentState}')"
          health="$(kubectl -n minio-tenant get tenant hybrid-ai -o jsonpath='{.status.healthStatus}')"
          [[ "$state" == "Initialized" && "$health" == "green" ]]
          kubectl get pods -n minio-tenant -o wide
          kubectl -n minio-tenant get tenant hybrid-ai
          echo "MinIO tenant is ready"

      - name: Install NFS Provisioner
        run: |
          echo "Installing NFS provisioner with server ${{ steps.storage.outputs.NFS_SERVER_IP }}..."
          sed -e "s/server: 192.168.100.1/server: ${{ steps.storage.outputs.NFS_SERVER_IP }}/g" \
            ../storage/nfs-provisioner-values.yaml > /tmp/nfs-provisioner-values.yaml
          helm upgrade --install nfs-subdir-external-provisioner nfs-subdir-external-provisioner \
            --repo https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/ \
            --namespace nfs-provisioner \
            --create-namespace \
            --version 4.0.18 \
            --values /tmp/nfs-provisioner-values.yaml \
            --wait \
            --timeout 10m
          for i in {1..60}; do
            if kubectl get storageclass private-nfs-rwx >/dev/null 2>&1; then
              echo "NFS storage class is ready"
              break
            fi
            echo "Waiting for NFS storage class... ($i/60)"
            sleep 10
          done
          kubectl get storageclass private-nfs-rwx
          for i in {1..30}; do
            if kubectl -n nfs-provisioner get deployment/nfs-subdir-external-provisioner >/dev/null 2>&1; then
              echo "NFS provisioner deployment exists"
              break
            fi
            echo "Waiting for NFS provisioner deployment... ($i/30)"
            sleep 10
          done
          kubectl -n nfs-provisioner rollout status deployment/nfs-subdir-external-provisioner --timeout=600s
          echo "NFS provisioner installed"

      - name: Apply shared storage claims
        run: |
          kubectl apply -f ../kubernetes/namespaces.yaml
          kubectl apply -k ../storage
          for pvc in model-build-cache model-artifacts; do
            kubectl -n model-build wait --for=jsonpath='{.status.phase}'=Bound "pvc/${pvc}" --timeout=600s
          done
          minio_access_key=$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.accessKey}' | base64 -d)
          minio_secret_key=$(kubectl -n minio-tenant get secret minio-creds-secret -o jsonpath='{.data.secretKey}' | base64 -d)
          echo "::add-mask::$minio_access_key"
          echo "::add-mask::$minio_secret_key"
          for namespace in default model-build; do
            kubectl create namespace "$namespace" --dry-run=client -o yaml | kubectl apply -f -
            kubectl -n "$namespace" create secret generic minio-client-credentials \
              --from-literal=accessKey="$minio_access_key" \
              --from-literal=secretKey="$minio_secret_key" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "Shared storage claims are bound"

      - name: Verify Storage
        run: |
          echo "Available storage classes:"
          kubectl get storageclass
          echo "Persistent volume claims:"
          kubectl get pvc -A
          echo "Storage setup complete!"

      - name: Cleanup storage sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG" "$KUBECONFIG"

  validate-gpu:
    name: Validate GPU Passthrough
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER }}
    needs: [bootstrap-k8s, setup-storage]
    if: ${{ always() && needs.bootstrap-k8s.result == 'success' && (!inputs.setup_storage || needs.setup-storage.result == 'success') && inputs.action == 'apply' && inputs.bootstrap_kubernetes && inputs.validate_gpu }}
    defaults:
      run:
        working-directory: .
    env:
      KUBECONFIG: ${{ github.workspace }}/.ha/openstack/kubeconfig
      HA_OPENSTACK_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER }}
      HA_OPENSTACK_SSH_KEY: /tmp/private-cloud-gpu-ssh
      HA_OPENSTACK_SSH_CONFIG: ${{ github.workspace }}/.ha/openstack/gpu_ssh_config
      HA_KUBECTL_TUNNEL_PORT: "16443"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GPU validation tools
        run: |
          missing=0
          for tool in python3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::Missing required runner tool: ${tool}"
              missing=1
            fi
          done
          if [[ "${INSTALL_OPENSTACK}" == "true" ]]; then
            for tool in ssh lxc; do
              if ! command -v "$tool" >/dev/null 2>&1; then
                echo "::error::Missing required runner tool for local DevStack kubectl tunnel: ${tool}"
                missing=1
              fi
            done
          fi
          exit "${missing}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: kubeconfig
          path: .ha/openstack

      - name: Download Terraform outputs
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: terraform-output
          path: .ha/openstack

      - name: Start kubectl SSH tunnel
        if: ${{ env.INSTALL_OPENSTACK == 'true' }}
        run: |
          if [[ -z "${PRIVATE_CLOUD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: PRIVATE_CLOUD_SSH_PRIVATE_KEY"
            exit 1
          fi
          FIRST_CP_IP=$(python3 - <<'PY'
          import json
          with open('.ha/openstack/terraform-output.json', 'r') as f:
              data = json.load(f)
          nodes = data.get('control_plane_nodes', {}).get('value', [])
          if nodes:
              print(nodes[0].get('floating_ip') or nodes[0].get('private_ip'))
          PY
          )
          if [[ -z "$FIRST_CP_IP" ]]; then
            echo "::error::Terraform output did not contain a control-plane IP"
            exit 1
          fi
          mkdir -p "$(dirname "$HA_OPENSTACK_SSH_KEY")" "$(dirname "$HA_OPENSTACK_SSH_CONFIG")"
          printf '%s\n' "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "$HA_OPENSTACK_SSH_KEY"
          chmod 600 "$HA_OPENSTACK_SSH_KEY"
          {
            printf 'Host *\n'
            printf '  User %s\n' "$HA_OPENSTACK_SSH_USER"
            printf '  IdentityFile %s\n' "$HA_OPENSTACK_SSH_KEY"
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking no\n'
            printf '  CheckHostIP no\n'
            printf '  UserKnownHostsFile /dev/null\n'
            printf '  LogLevel ERROR\n'
            printf '  ProxyCommand lxc exec ha-openstack -- nc %%h %%p\n'
          } > "$HA_OPENSTACK_SSH_CONFIG"
          chmod 600 "$HA_OPENSTACK_SSH_CONFIG"
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          ssh -F "$HA_OPENSTACK_SSH_CONFIG" \
            -fN \
            -L "127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" \
            "$FIRST_CP_IP"
          echo "kubectl tunnel started on 127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}"

      - name: Install NVIDIA runtime resources
        run: |
          echo "Installing NVIDIA RuntimeClass and device plugin..."
          kubectl apply -f private/gpu-worker/runtimeclass.yaml
          kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.14.5/nvidia-device-plugin.yml
          echo "NVIDIA runtime resources installed"

      - name: Wait for GPU nodes
        timeout-minutes: 5
        run: |
          echo "Waiting for GPU nodes to be ready..."
          kubectl wait --for=condition=Ready node -l hybrid-ai.io/accelerator=nvidia --timeout=300s
          echo "GPU nodes:"
          kubectl get nodes -l hybrid-ai.io/accelerator=nvidia -o wide

      - name: Run GPU validation tests
        run: |
          echo "Running GPU validation jobs..."
          kubectl delete job/gpu-validation -n kube-system --ignore-not-found=true
          kubectl delete job/gpu-tensorflow-test -n default --ignore-not-found=true
          kubectl apply -f private/gpu-worker/gpu-validation-job.yaml

          echo "Waiting for nvidia-smi job..."
          kubectl wait --for=condition=Complete job/gpu-validation -n kube-system --timeout=300s
          kubectl logs job/gpu-validation -n kube-system

          echo "Waiting for TensorFlow GPU test..."
          kubectl wait --for=condition=Complete job/gpu-tensorflow-test --timeout=600s
          kubectl logs job/gpu-tensorflow-test

          echo "GPU validation complete!"

      - name: Run MinIO connectivity test
        if: ${{ inputs.setup_storage }}
        run: |
          echo "Testing MinIO connectivity..."
          kubectl delete job/dataset-minio-test --ignore-not-found=true
          kubectl apply -f private/gpu-worker/minio-validation-job.yaml
          kubectl wait --for=condition=Complete job/dataset-minio-test --timeout=120s
          kubectl logs job/dataset-minio-test
          echo "MinIO validation complete!"

      - name: Cleanup GPU validation sensitive files
        if: always()
        run: |
          pgrep -f "ssh .*127.0.0.1:${HA_KUBECTL_TUNNEL_PORT}:127.0.0.1:6443" | xargs -r kill || true
          rm -f "$HA_OPENSTACK_SSH_KEY" "$HA_OPENSTACK_SSH_CONFIG"
