name: Private Cloud Foundation

on:
  push:
    branches:
      - feature/private
    paths:
      - .github/workflows/private-cloud-foundation.yml
      - infra/private-cloud/openstack/**
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Terraform action to run against the OpenStack foundation.
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy
      apply_kubernetes:
        description: Apply namespace, quota, RBAC, and network-policy baseline.
        required: true
        type: boolean
        default: false
      apply_storage:
        description: Apply storage baseline after replacing example values.
        required: true
        type: boolean
        default: false
      apply_gpu:
        description: Apply GPU runtime and validation baseline.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_ACTION: ${{ github.event_name == 'push' && vars.PRIVATE_CLOUD_AUTO_APPLY == 'true' && 'apply' || inputs.terraform_action || 'plan' }}
  PRIVATE_CLOUD_TOOL_BIN_DIR: ${{ vars.PRIVATE_CLOUD_TOOL_BIN_DIR }}

jobs:
  terraform:
    name: Terraform OpenStack
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: infra/private-cloud/openstack
    env:
      OS_AUTH_URL: ${{ secrets.OPENSTACK_AUTH_URL }}
      OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
      OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
      OS_PROJECT_NAME: ${{ secrets.OPENSTACK_PROJECT_NAME }}
      OS_USER_DOMAIN_NAME: ${{ secrets.OPENSTACK_USER_DOMAIN_NAME }}
      OS_PROJECT_DOMAIN_NAME: ${{ secrets.OPENSTACK_PROJECT_DOMAIN_NAME }}
      OS_REGION_NAME: ${{ vars.OPENSTACK_REGION }}
      OS_IDENTITY_API_VERSION: "3"
      TF_BACKEND_CONFIG: ${{ secrets.TF_BACKEND_CONFIG }}
      TF_BACKEND_TYPE: ${{ vars.TF_BACKEND_TYPE || 's3' }}
      PRIVATE_CLOUD_TFVARS: ${{ secrets.PRIVATE_CLOUD_TFVARS }}
      PRIVATE_CLOUD_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_CLOUD_SSH_PRIVATE_KEY }}
      PRIVATE_CLOUD_SSH_USER: ${{ vars.PRIVATE_CLOUD_SSH_USER || 'ubuntu' }}
      PRIVATE_CLOUD_SSH_TARGET: ${{ vars.PRIVATE_CLOUD_SSH_TARGET || 'auto' }}
      PRIVATE_CLOUD_SSH_PROXY_CONTAINER: ${{ vars.PRIVATE_CLOUD_SSH_PROXY_CONTAINER }}
      TF_VAR_ssh_public_key: ${{ secrets.PRIVATE_CLOUD_SSH_PUBLIC_KEY }}
      TF_VAR_control_plane_image_name: ${{ vars.CONTROL_PLANE_IMAGE_NAME }}
      TF_VAR_control_plane_flavor_name: ${{ vars.CONTROL_PLANE_FLAVOR_NAME }}
      TF_VAR_build_worker_image_name: ${{ vars.BUILD_WORKER_IMAGE_NAME }}
      TF_VAR_build_worker_flavor_name: ${{ vars.BUILD_WORKER_FLAVOR_NAME }}
      TF_VAR_gpu_worker_image_name: ${{ vars.GPU_WORKER_IMAGE_NAME }}
      TF_VAR_gpu_worker_flavor_name: ${{ vars.GPU_WORKER_FLAVOR_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add self-hosted tool path
        if: ${{ env.PRIVATE_CLOUD_TOOL_BIN_DIR != '' }}
        run: echo "${PRIVATE_CLOUD_TOOL_BIN_DIR}" >> "${GITHUB_PATH}"

      - name: Setup Terraform
        if: ${{ env.PRIVATE_CLOUD_TOOL_BIN_DIR == '' }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Verify required inputs
        run: |
          required=(
            OS_AUTH_URL
            OS_USERNAME
            OS_PASSWORD
            OS_PROJECT_NAME
            OS_USER_DOMAIN_NAME
            OS_PROJECT_DOMAIN_NAME
            TF_VAR_ssh_public_key
            TF_VAR_control_plane_image_name
            TF_VAR_control_plane_flavor_name
            TF_VAR_build_worker_image_name
            TF_VAR_build_worker_flavor_name
            TF_VAR_gpu_worker_image_name
            TF_VAR_gpu_worker_flavor_name
          )

          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret or variable: ${name}"
              missing=1
            fi
          done

          if [[ "${TERRAFORM_ACTION}" != "plan" && -z "${TF_BACKEND_CONFIG}" ]]; then
            echo "::error::TF_BACKEND_CONFIG secret is required for apply or destroy."
            missing=1
          fi

          exit "${missing}"

      - name: Terraform init
        run: |
          if [[ -n "${TF_BACKEND_CONFIG}" ]]; then
            printf "terraform {\n  backend \"%s\" {}\n}\n" "${TF_BACKEND_TYPE}" > backend.generated.tf
            printf "%s" "${TF_BACKEND_CONFIG}" > backend.hcl
            terraform init -backend-config=backend.hcl
          else
            terraform init
          fi

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Write optional tfvars
        run: |
          if [[ -n "${PRIVATE_CLOUD_TFVARS}" ]]; then
            printf "%s" "${PRIVATE_CLOUD_TFVARS}" > github.auto.tfvars
          fi

      - name: Terraform plan
        run: |
          if [[ "${TERRAFORM_ACTION}" == "destroy" ]]; then
            terraform plan -destroy -out=private-cloud.tfplan
          else
            terraform plan -out=private-cloud.tfplan
          fi

      - name: Terraform apply selected action
        if: ${{ env.TERRAFORM_ACTION == 'apply' || env.TERRAFORM_ACTION == 'destroy' }}
        run: terraform apply -auto-approve private-cloud.tfplan

      - name: Verify node dependency bootstrap
        if: ${{ env.TERRAFORM_ACTION == 'apply' && env.PRIVATE_CLOUD_SSH_PRIVATE_KEY != '' }}
        run: |
          key_file="${RUNNER_TEMP}/private-cloud-ssh"
          inventory_file="${RUNNER_TEMP}/private-cloud-nodes.tsv"

          printf "%s" "${PRIVATE_CLOUD_SSH_PRIVATE_KEY}" > "${key_file}"
          chmod 600 "${key_file}"
          terraform output -json > "${RUNNER_TEMP}/private-cloud-output.json"

          python3 - "${PRIVATE_CLOUD_SSH_TARGET}" "${RUNNER_TEMP}/private-cloud-output.json" > "${inventory_file}" <<'PY'
          import json
          import sys

          target_mode = sys.argv[1]
          output_file = sys.argv[2]
          with open(output_file, "r", encoding="utf-8") as handle:
              data = json.load(handle)

          def nodes(name):
              return data.get(name, {}).get("value", []) or []

          def target_ip(node):
              private_ip = node.get("private_ip") or ""
              floating_ip = node.get("floating_ip") or ""
              if target_mode == "private_ip":
                  return private_ip
              if target_mode == "floating_ip":
                  return floating_ip
              return floating_ip or private_ip

          for output_name, role in (
              ("control_plane_nodes", "control-plane"),
              ("build_worker_nodes", "build-worker"),
              ("gpu_worker_nodes", "gpu-worker"),
          ):
              for node in nodes(output_name):
                  target = target_ip(node)
                  if not target:
                      continue
                  print(role, node.get("name", ""), target, sep="\t")
          PY

          while IFS=$'\t' read -r role name target; do
            [[ -n "${target}" ]] || continue
            echo "Waiting for cloud-init and dependencies on ${name} (${role}) via ${target}"

            ssh_args=(
              -o BatchMode=yes
              -o ConnectTimeout=20
              -o StrictHostKeyChecking=no
              -o CheckHostIP=no
              -o "UserKnownHostsFile=${RUNNER_TEMP}/known_hosts"
              -i "${key_file}"
            )

            if [[ -n "${PRIVATE_CLOUD_SSH_PROXY_CONTAINER}" ]]; then
              ssh_args+=(-o "ProxyCommand=lxc exec ${PRIVATE_CLOUD_SSH_PROXY_CONTAINER} -- nc %h %p")
            fi

            deadline=$((SECONDS + 900))
            until ssh "${ssh_args[@]}" "${PRIVATE_CLOUD_SSH_USER}@${target}" "sudo cloud-init status --wait && sudo /usr/local/sbin/hybrid-ai-dependency-check"; do
              if (( SECONDS >= deadline )); then
                echo "::error::Dependency bootstrap did not pass for ${name} (${target})"
                exit 1
              fi
              sleep 15
            done
          done < "${inventory_file}"

  kubernetes:
    name: Kubernetes Baseline
    runs-on: ${{ vars.PRIVATE_CLOUD_RUNNER || 'ubuntu-latest' }}
    needs: terraform
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.apply_kubernetes || inputs.apply_storage || inputs.apply_gpu) }}
    env:
      KUBECONFIG_B64: ${{ secrets.PRIVATE_KUBECONFIG_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [[ -z "${KUBECONFIG_B64}" ]]; then
            echo "::error::PRIVATE_KUBECONFIG_B64 secret is required to apply Kubernetes manifests."
            exit 1
          fi

          kubeconfig="${RUNNER_TEMP}/private-kubeconfig"
          printf "%s" "${KUBECONFIG_B64}" | base64 -d > "${kubeconfig}"
          chmod 600 "${kubeconfig}"
          echo "KUBECONFIG=${kubeconfig}" >> "${GITHUB_ENV}"

      - name: Apply Kubernetes foundation
        if: ${{ inputs.apply_kubernetes || inputs.apply_storage || inputs.apply_gpu }}
        run: kubectl apply -k infra/private-cloud/kubernetes

      - name: Apply storage foundation
        if: ${{ inputs.apply_storage }}
        run: kubectl apply -k infra/private-cloud/storage

      - name: Apply GPU foundation
        if: ${{ inputs.apply_gpu }}
        run: kubectl apply -k infra/private-cloud/gpu-worker
