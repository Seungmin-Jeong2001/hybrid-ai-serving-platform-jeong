name: Private Cloud Plan

on:
  push:
    branches:
      - feature/private
    paths:
      - .github/workflows/private-cloud-foundation.yml
      - .github/workflows/private-cloud-plan.yml
      - .github/workflows/private-cloud-apply.yml
      - .github/workflows/private-cloud-destroy.yml
      - private/openstack/**
      - private/kubernetes-bootstrap/**
      - private/storage/**
      - private/gpu-worker/**
      - private/reverse-proxy/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: Plan Foundation
    uses: ./.github/workflows/private-cloud-foundation.yml
    with:
      action: plan
      install_openstack: true
      bootstrap_kubernetes: false
      apply_kubernetes: false
      setup_storage: false
      validate_gpu: false
      minio_volume_size: "10"
      force_cleanup: false
    secrets: inherit
