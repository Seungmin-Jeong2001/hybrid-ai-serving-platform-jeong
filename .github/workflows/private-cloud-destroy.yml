name: Private Cloud Destroy

on:
  workflow_dispatch:
    inputs:
      cleanup_devstack:
        description: Remove the local DevStack container after Terraform destroy
        required: true
        type: boolean
        default: false

permissions:
  contents: read

# Shared with apply so destroy and apply never run against the host at the same
# time. Destroy is not auto-cancelled (a half-finished destroy is risky).
concurrency:
  group: private-cloud-foundation
  cancel-in-progress: false

jobs:
  destroy:
    name: Remote Destroy
    uses: ./.github/workflows/private-cloud-remote.yml
    with:
      command: destroy
      cleanup_devstack: ${{ inputs.cleanup_devstack }}
    secrets: inherit
