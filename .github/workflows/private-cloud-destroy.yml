name: Private Cloud Destroy

on:
  workflow_dispatch:
    inputs:
      cleanup_devstack:
        description: Remove the local DevStack container after Terraform destroy
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  destroy:
    name: Destroy Foundation
    uses: ./.github/workflows/private-cloud-foundation.yml
    with:
      action: destroy
      install_openstack: true
      bootstrap_kubernetes: false
      apply_kubernetes: false
      setup_storage: false
      validate_gpu: false
      minio_volume_size: "10"
      force_cleanup: ${{ inputs.cleanup_devstack }}
    secrets: inherit
